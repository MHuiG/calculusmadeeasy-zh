<h1><br>开场白</h1>
<p class="a rotatedFloralHeartBullet">


<p>既然有这么多傻瓜都能算微积分，
那还会有人觉得另一个傻瓜学会同样的把戏
是困难或乏味的事，这就很奇怪了。

<p>有些微积分小把戏其实相当容易。有些则难得惊人。
那些写高等数学教科书的傻瓜们，而且他们多半是聪明的傻瓜，
很少肯费心告诉你，那些容易的计算究竟有多容易。
相反，他们似乎总想用最困难的办法来做，好让你佩服他们那了不起的聪明。

<p>我本人是个相当迟钝的人，只好自己把那些难处一点点忘掉。
现在，我愿意把并不困难的部分献给各位同伴傻瓜。
把这些彻底掌握，剩下的自然会跟上。
一个傻瓜能做到的，另一个傻瓜也能。
